name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Automatic update every day
  workflow_dispatch:     # Manual "Run Now" button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Allows the script to save the SVG to your repo
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # These options are the same as the URL parameters you used before
          options: username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/stats.svg
          git commit -m "Update README stats" || exit 0
          git push
