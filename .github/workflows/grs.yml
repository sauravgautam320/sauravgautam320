name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure directory exists
        run: mkdir -p profile

      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate Top Langs Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=tokyonight&layout=compact
          path: profile/langs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate Streak Card
        uses: lowlighter/metrics@latest
        with:
          filename: profile/streak.svg
          token: ${{ secrets.GH_PAT }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p profile # Double check folder exists before adding
          git add profile/*.svg
          # The next line is the "magic" - it checks if there are changes before committing
          git commit -m "Update README cards" || echo "No changes to commit"
          git push origin main # Explicitly push to the main branch
